<!DOCTYPE html>
<html lang="en" data-framework="javascript-es6">
<meta charset="UTF-8" />
<meta name="description" content="A TodoMVC written with JavaScript es5 features." />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="X-UA-Compatible" content="ie=edge" />
<title>Todos</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/todomvc-app-css@2.4.3/index.css">
</head>

<body>
    <section class="todoapp">
        <header class="header">
            <h1>todos</h1>
            <input class="new-todo" placeholder="What needs to be done?" autofocus />
        </header>
        <main class="main">
            <div class="toggle-all-container">
                <input class="toggle-all" type="checkbox" />
                <label class="toggle-all-label" for="toggle-all">Mark all as complete</label>
            </div>
            <ul class="todo-list">
                <li class="todo">
                    <div class="view">
                        <input class="toggle" type="checkbox" />
                        <label>Todo 1</label>
                        <button class="destroy"></button>
                    </div>
                </li>
                <li class="todo">
                    <div class="view">
                        <input class="toggle" type="checkbox" />
                        <label>Todo 2</label>
                        <button class="destroy"></button>
                    </div>
                </li>
            </ul>
        </main>
        <footer class="footer">
            <span class="todo-count"></span>
            <ul class="filters">
                <li>
                    <a href="#/" class="selected">All</a>
                </li>
                <li>
                    <a href="#/active">Active</a>
                </li>
                <li>
                    <a href="#/completed">Completed</a>
                </li>
            </ul>
            <button class="clear-completed">Clear completed</button>
        </footer>
    </section>
</body>

</html>
